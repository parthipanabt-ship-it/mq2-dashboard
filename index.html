<!DOCTYPE html>
<html>
<head>
    <title>MQ2 MQTT Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; }
        #value { font-size: 80px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
        .online { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Gas Sensor Reading</h2>
        <div id="value">---</div>
        <p id="status" class="status">Connecting...</p>
    </div>

    <script>
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "client_" + Math.random());

        client.onMessageArrived = (msg) => {
            document.getElementById("value").innerText = msg.payloadString;
        };

        client.connect({
            useSSL: true, 
            onSuccess: () => {
                document.getElementById("status").innerText = "● Live Data Connected";
                document.getElementById("status").classList.add("online");
                client.subscribe("home/sensors/mq2"); // Make sure this matches your ESP8266 code
            }
        });
    </script>
</body>
</html>
